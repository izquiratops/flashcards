<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japanese Vocabulary Flashcards</title>
    <!-- 98.css -->
    <link rel="stylesheet" href="https://unpkg.com/xp.css" />
    <!-- Alpine.js -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- Custom overrides -->
    <link rel="stylesheet" type="text/css" href="style.css">
</head>

<body>
    <div class="container" x-data="flashcardApp()">
        <div class="window">
            <div class="title-bar">
                <div class="title-bar-text">Japanese Vocabulary Flashcards</div>
            </div>
            <div class="window-body">
                <!-- CSV Upload Area -->
                <div x-show="!started">
                    <div class="drop-area" :class="isDragging ? 'active' : ''" @dragover.prevent="isDragging = true"
                        @dragleave="isDragging = false" @drop.prevent="handleDrop($event)">
                        <p class="mb-4">
                            Drag and drop your CSV file here or click to select it
                        </p>
                        <div class="field-row">
                            <button @click="$refs.fileInput.click()">
                                📂 Select CSV File
                            </button>
                            <input type="file" x-ref="fileInput" @change="handleFileSelect($event)"
                                accept=".csv,text/csv" class="hidden">
                        </div>
                        <div class="mt-4">
                            <p>CSV Format: word,reading,translation</p>
                            <p>Example: 学校,がっこう,School</p>
                        </div>
                    </div>
                    <div class="field-row">
                        <button @click="loadDefaultVocabulary()">
                            📚 Load N4 Vocabulary
                        </button>
                    </div>
                </div>
  
                <!-- Flashcards Container -->
                <div x-show="started" class="text-center">
                    <div @click="toggleTranslation()" class="flashcard">
                        <div class="word" x-text="currentWord.word"></div>
                        <div class="reading" x-text="currentWord.reading"></div>
                        <div class="translation" x-show="showingTranslation" x-text="currentWord.translation"></div>
                    </div>
                    <p class="mb-6">Click on the card to see the translation. Click again to move to the next word.</p>
                    <div class="button-row">
                        <button @click="copyToClipboard()">
                            <span x-text="copied ? '✅ Copied!' : '📋 Copy Word'"></span>
                        </button>
                        <button @click="backToUpload()">
                            🔙 Back to Upload
                        </button>
                    </div>
                </div>
            </div>
  
            <div class="status-bar">
                <p x-show="started" x-text="`Progress: ${seenCount} of ${vocabulary.length} words seen`"
                    class="status-bar-field"></p>
                <p x-show="copied" class="status-bar-field">
                    Word copied to clipboard
                </p>
            </div>
        </div>
    </div>  

    <script>
        function flashcardApp() {
            return {
                vocabulary: [],
                currentWord: { word: '', reading: '', translation: '' },
                seenIndices: new Set(),
                showingTranslation: false,
                started: false,
                isDragging: false,
                copied: false,
                get seenCount() {
                    return this.seenIndices.size;
                },
                getRandomUniqueIndex() {
                    // If we've seen all words, reset
                    if (this.seenIndices.size >= this.vocabulary.length) {
                        this.seenIndices.clear();
                    }
                    // Find an unseen index
                    let index;
                    do {
                        index = Math.floor(Math.random() * this.vocabulary.length);
                    } while (this.seenIndices.has(index));
                    this.seenIndices.add(index);
                    return index;
                },
                showNewWord() {
                    const index = this.getRandomUniqueIndex();
                    this.currentWord = this.vocabulary[index];
                    this.showingTranslation = false;
                    this.copied = false;
                },
                toggleTranslation() {
                    if (this.showingTranslation) {
                        this.showNewWord();
                    } else {
                        this.showingTranslation = true;
                    }
                },
                copyToClipboard() {
                    navigator.clipboard.writeText(this.currentWord.word)
                        .then(() => {
                            this.copied = true;
                            setTimeout(() => {
                                this.copied = false;
                            }, 2000);
                        })
                        .catch(err => {
                            console.error('Error copying to clipboard:', err);
                            alert('Could not copy to clipboard. Please try again.');
                        });
                },
                processCSV(csvText) {
                    const lines = csvText.split(/\r\n|\n/);
                    const newVocabulary = [];
                    for (let i = 0; i < lines.length; i++) {
                        const line = lines[i].trim();
                        if (!line) continue;
                        // Find the position of the first and second commas
                        const firstCommaIndex = line.indexOf(',');
                        const secondCommaIndex = line.indexOf(',', firstCommaIndex + 1);
                        // Only process if we have at least two commas
                        if (firstCommaIndex !== -1 && secondCommaIndex !== -1) {
                            const word = line.substring(0, firstCommaIndex).trim();
                            const reading = line.substring(firstCommaIndex + 1, secondCommaIndex).trim();
                            const translation = line.substring(secondCommaIndex + 1).trim();
                            newVocabulary.push({
                                word: word,
                                reading: reading,
                                translation: translation
                            });
                        }
                    }
                    if (newVocabulary.length > 0) {
                        this.vocabulary = newVocabulary;
                        this.startFlashcards();
                    } else {
                        alert('Could not load any words from the CSV file. Make sure the format is correct.');
                    }
                },
                startFlashcards() {
                    this.seenIndices.clear();
                    this.started = true;
                    this.showNewWord();
                },
                backToUpload() {
                    this.started = false;
                },
                loadDefaultVocabulary() {
                    fetch('JLPT N4.csv')
                        .then(response => {
                            if (!response.ok) {
                                throw new Error('Network response was not ok');
                            }
                            return response.text();
                        })
                        .then(csvText => {
                            this.processCSV(csvText);
                        })
                        .catch(error => {
                            console.error('Error loading default vocabulary file:', error);
                            alert('Could not load the default vocabulary file.');
                        });
                },
                handleDrop(event) {
                    this.isDragging = false;
                    const files = event.dataTransfer.files;
                    this.handleFiles(files);
                },
                handleFileSelect(event) {
                    const files = event.target.files;
                    this.handleFiles(files);
                },
                handleFiles(files) {
                    if (files.length > 0) {
                        const file = files[0];
                        if (file.type === 'text/csv' || file.name.endsWith('.csv')) {
                            const reader = new FileReader();
                            reader.onload = (e) => {
                                this.processCSV(e.target.result);
                            };
                            reader.readAsText(file);
                        } else {
                            alert('Please select a valid CSV file.');
                        }
                    }
                }
            };
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(registration => {
                        console.log('ServiceWorker registration successful with scope: ', registration.scope);
                    })
                    .catch(error => {
                        console.log('ServiceWorker registration failed: ', error);
                    });
            });
        }
    </script>
</body>

</html>
