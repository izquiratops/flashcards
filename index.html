<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcards</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Alpine.js -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="manifest" href="manifest.json">
    <script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
        navigator.serviceWorker.register('./sw.js')
            .then(() => console.log('Service Worker registered.'))
            .catch(error => console.error(error));
        });
    }
    </script>
</head>

<body class="bg-gray-100 dark:bg-gray-800 flex flex-col" style="min-height: 100svh">
    <div class="flex-grow flex flex-col items-center justify-center p-4 w-full" x-data="flashcardApp()">
        <h1 class="text-3xl font-bold text-center text-gray-800 dark:text-white mb-8">Flashcards 🍱</h1>

        <!-- CSV Upload Area -->
        <div x-show="!started" class="w-full max-w-3xl">
            <div class="bg-gray-100 dark:bg-gray-700 border-2 border-dashed rounded-lg p-8 mb-6 transition-all"
                :class="isDragging ? 'border-blue-500 bg-blue-50' : 'border-gray-300 dark:border-gray-500'"
                @dragover.prevent="isDragging = true" @dragleave="isDragging = false"
                @drop.prevent="handleDrop($event)">
                <p class="text-center dark:text-white mb-4">Drag and drop your CSV file here or click to select it</p>
                <div class="flex justify-center">
                    <button @click="$refs.fileInput.click()"
                        class="bg-blue-500 hover:bg-blue-600 text-white py-2 px-6 rounded transition-colors">
                        Select CSV File
                    </button>
                    <input type="file" x-ref="fileInput" @change="handleFileSelect($event)" accept=".csv,text/csv"
                        class="hidden">
                </div>

                <div class="mt-6 text-sm text-gray-600 dark:text-gray-300 text-center">
                    <p>CSV Format: word,reading</p>
                    <p>Example: 学校,がっこう</p>
                </div>
            </div>

            <p class="text-center dark:text-white mb-4">Or load the files I already uploaded in the repository</p>

            <div class="flex justify-center gap-4">
                <button @click="loadDefaultVocabulary('JLPT_N4.csv')"
                    class="w-full bg-blue-500 hover:bg-blue-600 text-white py-3 px-4 rounded transition-colors">
                    N4-N5 Vocabulary
                </button>
                <button @click="loadDefaultVocabulary('ドリル.csv')"
                    class="w-full bg-blue-500 hover:bg-blue-600 text-white py-3 px-4 rounded transition-colors">
                    ドリル Vocabulary
                </button>
            </div>
        </div>

        <!-- Flashcards Container -->
        <div x-show="started" class="text-center w-full max-w-4xl flex flex-col items-center">
            <div @click="toggleReading()"
                class="bg-white dark:bg-gray-700 rounded-xl shadow-md p-12 mb-8 min-h-[300px] w-full max-w-2xl flex flex-col items-center justify-center cursor-pointer transition-all hover:-translate-y-1 hover:shadow-lg select-none">
                <div class="text-5xl dark:text-white font-bold mb-4" x-text="currentWord.word"></div>
                <div class="text-3xl text-gray-700 dark:text-white" x-show="showingReading"
                    x-transition:enter="transition ease-out duration-200"
                    x-transition:enter-start="opacity-0 transform scale-95"
                    x-transition:enter-end="opacity-100 transform scale-100" x-text="currentWord.reading"></div>
            </div>

            <div class="text-gray-600 dark:text-gray-300 mb-8 text-lg"
                x-text="`Progress: ${seenCount} of ${vocabulary.length} words seen`"></div>

            <div class="flex justify-center gap-4">
                <button @click="goToJisho()"
                    class="bg-gray-500 hover:bg-gray-600 text-white py-3 px-6 rounded transition-colors text-base">
                    Go to Jisho
                </button>
                <button @click="backToUpload()"
                    class="bg-red-500 hover:bg-red-600 text-white py-3 px-6 rounded transition-colors text-base">
                    Back to Home
                </button>
            </div>
        </div>
    </div>

    <script>
        function flashcardApp() {
            return {
                vocabulary: [],
                currentWord: { word: '', reading: '' },
                seenIndices: new Set(),
                showingReading: false,
                started: false,
                isDragging: false,

                get seenCount() {
                    return this.seenIndices.size;
                },

                getRandomUniqueIndex() {
                    // If we've seen all words, reset
                    if (this.seenIndices.size >= this.vocabulary.length) {
                        this.seenIndices.clear();
                    }

                    // Find an unseen index
                    let index;
                    do {
                        index = Math.floor(Math.random() * this.vocabulary.length);
                    } while (this.seenIndices.has(index));

                    this.seenIndices.add(index);
                    return index;
                },

                showNewWord() {
                    const index = this.getRandomUniqueIndex();
                    this.currentWord = this.vocabulary[index];
                    this.showingReading = false;
                },

                toggleReading() {
                    if (this.showingReading) {
                        this.showNewWord();
                    } else {
                        this.showingReading = true;
                    }
                },

                goToJisho() {
                    window.open(`https://jisho.org/search/${encodeURIComponent(this.currentWord.word)}`, '_blank');
                },

                processCSV(csvText) {
                    const lines = csvText.split(/\r\n|\n/);
                    const newVocabulary = [];
                    for (let i = 0; i < lines.length; i++) {
                        const line = lines[i].trim();
                        if (!line) continue;
                        const firstCommaIndex = line.indexOf(',');
                        if (firstCommaIndex !== -1) {
                            const word = line.substring(0, firstCommaIndex).trim();
                            const reading = line.substring(firstCommaIndex + 1).trim();
                            newVocabulary.push({
                                word: word,
                                reading: reading,
                            });
                        }
                    }
                    if (newVocabulary.length > 0) {
                        this.vocabulary = newVocabulary;
                        this.startFlashcards();
                    } else {
                        alert('Could not load any words from the CSV file. Make sure the format is correct.');
                    }
                },

                startFlashcards() {
                    this.seenIndices.clear();
                    this.started = true;
                    this.showNewWord();
                },

                backToUpload() {
                    this.started = false;
                },

                loadDefaultVocabulary(file) {
                    fetch(file)
                        .then(response => {
                            if (!response.ok) {
                                throw new Error('Network response was not ok');
                            }
                            return response.text();
                        })
                        .then(csvText => {
                            this.processCSV(csvText);
                        })
                        .catch(error => {
                            console.error('Error loading default vocabulary file:', error);
                            alert('Could not load the default vocabulary file.');
                        });
                },

                handleDrop(event) {
                    this.isDragging = false;
                    const files = event.dataTransfer.files;
                    this.handleFiles(files);
                },

                handleFileSelect(event) {
                    const files = event.target.files;
                    this.handleFiles(files);
                },

                handleFiles(files) {
                    if (files.length > 0) {
                        const file = files[0];
                        if (file.type === 'text/csv' || file.name.endsWith('.csv')) {
                            const reader = new FileReader();
                            reader.onload = (e) => {
                                this.processCSV(e.target.result);
                            };
                            reader.readAsText(file);
                        } else {
                            alert('Please select a valid CSV file.');
                        }
                    }
                }
            };
        }
    </script>
</body>

</html>
