<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japanese Vocabulary Flashcards</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Alpine.js -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-100 flex flex-col" style="min-height: 100svh">
    <div class="flex-grow flex flex-col items-center justify-center p-4 w-full" x-data="flashcardApp()">
        <h1 class="text-3xl font-bold text-center text-gray-800 mb-8">Japanese Vocabulary Flashcards 🍱</h1>
        
        <!-- CSV Upload Area -->
        <div x-show="!started" class="w-full max-w-3xl">
            <div 
                class="border-2 border-dashed rounded-lg p-8 mb-6 transition-all"
                :class="isDragging ? 'border-blue-500 bg-blue-50' : 'border-gray-300'"
                @dragover.prevent="isDragging = true"
                @dragleave="isDragging = false"
                @drop.prevent="handleDrop($event)"
            >
                <p class="text-center mb-4">Drag and drop your CSV file here or click to select it</p>
                <div class="flex justify-center">
                    <button 
                        @click="$refs.fileInput.click()" 
                        class="bg-blue-500 hover:bg-blue-600 text-white py-2 px-6 rounded transition-colors"
                    >
                        Select CSV File
                    </button>
                    <input 
                        type="file" 
                        x-ref="fileInput" 
                        @change="handleFileSelect($event)" 
                        accept=".csv,text/csv" 
                        class="hidden"
                    >
                </div>
                
                <div class="mt-6 text-sm text-gray-600 text-center">
                    <p>CSV Format: word,reading,translation</p>
                    <p>Example: 学校,がっこう,School</p>
                </div>
            </div>

            <p class="text-center mb-4">Or load the files I already uploaded in the repository</p>
            
            <div class="flex justify-center gap-4">
                <button 
                    @click="loadDefaultVocabulary('JLPT_N4.csv')" 
                    class="w-full bg-blue-500 hover:bg-blue-600 text-white py-3 px-4 rounded transition-colors"
                    >
                    N4-N5 Vocabulary
                </button>
                <button 
                    @click="loadDefaultVocabulary('ドリル.csv')" 
                    class="w-full bg-blue-500 hover:bg-blue-600 text-white py-3 px-4 rounded transition-colors"
                    >
                    ドリル Vocabulary
                </button>
            </div>
        </div>
        
        <!-- Flashcards Container -->
        <div x-show="started" class="text-center w-full max-w-4xl flex flex-col items-center">            
            <div 
                @click="toggleTranslation()"
                class="bg-white rounded-xl shadow-md p-12 mb-8 min-h-[300px] w-full max-w-2xl flex flex-col items-center justify-center cursor-pointer transition-all hover:-translate-y-1 hover:shadow-lg select-none"
            >
                <div class="text-5xl font-bold mb-4" x-text="currentWord.word"></div>
                <div class="text-2xl text-gray-600 mb-6" x-text="currentWord.reading"></div>
                <div 
                    class="text-3xl text-gray-700"
                    x-show="showingTranslation" 
                    x-transition:enter="transition ease-out duration-200"
                    x-transition:enter-start="opacity-0 transform scale-95"
                    x-transition:enter-end="opacity-100 transform scale-100"
                    x-text="currentWord.translation"
                ></div>
            </div>
            
            <div class="text-gray-600 mb-8 text-lg" x-text="`Progress: ${seenCount} of ${vocabulary.length} words seen`"></div>
            
            <div class="flex justify-center gap-4">
                <button 
                    @click="goToJisho()" 
                    class="bg-gray-500 hover:bg-gray-600 text-white py-3 px-6 rounded transition-colors text-base"
                >
                    Go to Jisho
                </button>
                <button 
                    @click="backToUpload()" 
                    class="bg-red-500 hover:bg-red-600 text-white py-3 px-6 rounded transition-colors text-base"
                >
                    Back to Home
                </button>
            </div>
        </div>
    </div>

    <script>
        function flashcardApp() {
            return {
                vocabulary: [],
                currentWord: { word: '', reading: '', translation: '' },
                seenIndices: new Set(),
                showingTranslation: false,
                started: false,
                isDragging: false,
                copied: false,
                
                get seenCount() {
                    return this.seenIndices.size;
                },
    
                getRandomUniqueIndex() {
                    // If we've seen all words, reset
                    if (this.seenIndices.size >= this.vocabulary.length) {
                        this.seenIndices.clear();
                    }
                    
                    // Find an unseen index
                    let index;
                    do {
                        index = Math.floor(Math.random() * this.vocabulary.length);
                    } while (this.seenIndices.has(index));
                    
                    this.seenIndices.add(index);
                    return index;
                },
                
                showNewWord() {
                    const index = this.getRandomUniqueIndex();
                    this.currentWord = this.vocabulary[index];
                    this.showingTranslation = false;
                    this.copied = false;
                },
                
                toggleTranslation() {
                    if (this.showingTranslation) {
                        this.showNewWord();
                    } else {
                        this.showingTranslation = true;
                    }
                },
                
                goToJisho() {
                    window.open(`https://jisho.org/search/${encodeURIComponent(this.currentWord.word)}`, '_blank');
                },
                
                processCSV(csvText) {
                    const lines = csvText.split(/\r\n|\n/);
                    const newVocabulary = [];
                    for (let i = 0; i < lines.length; i++) {
                        const line = lines[i].trim();
                        if (!line) continue;
                        // Find the position of the first and second commas
                        const firstCommaIndex = line.indexOf(',');
                        const secondCommaIndex = line.indexOf(',', firstCommaIndex + 1);
                        // Only process if we have at least two commas
                        if (firstCommaIndex !== -1 && secondCommaIndex !== -1) {
                            const word = line.substring(0, firstCommaIndex).trim();
                            const reading = line.substring(firstCommaIndex + 1, secondCommaIndex).trim();
                            const translation = line.substring(secondCommaIndex + 1).trim();
                            newVocabulary.push({
                                word: word,
                                reading: reading,
                                translation: translation
                            });
                        }
                    }
                    if (newVocabulary.length > 0) {
                        this.vocabulary = newVocabulary;
                        this.startFlashcards();
                    } else {
                        alert('Could not load any words from the CSV file. Make sure the format is correct.');
                    }
                },
                
                startFlashcards() {
                    this.seenIndices.clear();
                    this.started = true;
                    this.showNewWord();
                },
                
                backToUpload() {
                    this.started = false;
                },
                
                loadDefaultVocabulary(file) {
                    fetch(file)
                        .then(response => {
                            if (!response.ok) {
                                throw new Error('Network response was not ok');
                            }
                            return response.text();
                        })
                        .then(csvText => {
                            this.processCSV(csvText);
                        })
                        .catch(error => {
                            console.error('Error loading default vocabulary file:', error);
                            alert('Could not load the default vocabulary file.');
                        });
                },
                
                handleDrop(event) {
                    this.isDragging = false;
                    const files = event.dataTransfer.files;
                    this.handleFiles(files);
                },
                
                handleFileSelect(event) {
                    const files = event.target.files;
                    this.handleFiles(files);
                },
                
                handleFiles(files) {
                    if (files.length > 0) {
                        const file = files[0];
                        if (file.type === 'text/csv' || file.name.endsWith('.csv')) {
                            const reader = new FileReader();
                            reader.onload = (e) => {
                                this.processCSV(e.target.result);
                            };
                            reader.readAsText(file);
                        } else {
                            alert('Please select a valid CSV file.');
                        }
                    }
                }
            };
        }
    </script>
</body>
</html>
